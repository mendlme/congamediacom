<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conga — All together. Now.</title>
  <meta name="description" content="Conga is a real-time social network built to help people discover and join live moments as they unfold.">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'General Sans';
      src: url('https://cdn.fontshare.com/wf/ZTKVQMMVQBBTJPBFHAIHJBBMOLRTUAI6/SDNXLXHUZRR7QXZUVKFAPYGXJQMZAROH/UZZXKKDZ365NKVJVCXEHJDNZFJGQ3NFG/GeneralSans-Bold.woff2') format('woff2');
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'General Sans';
      src: url('https://cdn.fontshare.com/wf/ZTKVQMMVQBBTJPBFHAIHJBBMOLRTUAI6/SDNXLXHUZRR7QXZUVKFAPYGXJQMZAROH/HE4WY6TCXL4STPQIJFQMYPLOHIGP35B5/GeneralSans-Semibold.woff2') format('woff2');
      font-weight: 600;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'General Sans';
      src: url('https://cdn.fontshare.com/wf/ZTKVQMMVQBBTJPBFHAIHJBBMOLRTUAI6/SDNXLXHUZRR7QXZUVKFAPYGXJQMZAROH/CJYRPAQHRCYBTCNXYXVKFZXG5JMRWNKS/GeneralSans-Medium.woff2') format('woff2');
      font-weight: 500;
      font-style: normal;
      font-display: swap;
    }

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --purple: #2A1756;
      --blue: #3B4BFF;
      --beige: #FFFCF2;
      --white: #FFFFFF;
      --red: #E7356A;
      --orange: #FE660E;
      --pink: #FFA7A7;
      --yellow: #FCD236;
      --green: #14C7A2;
      --light-green: #DBFE81;
      --light-blue: #78CDFE;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'General Sans', 'Inter', sans-serif;
      font-weight: 700;
      background-color: var(--purple);
      color: var(--beige);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      position: relative;
      gap: 12vh;
    }

    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .content-bottom {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 1.25rem;
    }

    /* Logo */
    .logo {
      margin-bottom: 0;
    }

    .logo svg {
      width: 320px;
      height: auto;
    }

    /* Coming soon badge */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(59, 75, 255, 0.2);
      border: 1px solid rgba(59, 75, 255, 0.4);
      border-radius: 100px;
      padding: 0.5rem 1.25rem;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--light-blue);
      margin-bottom: 2rem;
      animation: pulse-glow 3s ease-in-out infinite;
    }

    .badge-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--blue);
      animation: blink 2s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 20px rgba(59, 75, 255, 0.05); }
      50% { box-shadow: 0 0 30px rgba(59, 75, 255, 0.15); }
    }

    /* Tagline */
    .tagline {
      font-family: 'General Sans', 'Inter', sans-serif;
      font-weight: 700;
      font-size: 1.5rem;
      color: var(--beige);
      margin-bottom: 0;
      line-height: 1.3;
    }



    /* Footer */
    .footer {
      position: absolute;
      bottom: 2rem;
      z-index: 1;
      font-size: 0.8rem;
      color: rgba(255, 252, 242, 0.25);
      letter-spacing: 0.02em;
    }

    /* Color bar accent at bottom */
    .color-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 4px;
      display: flex;
      z-index: 2;
    }

    .color-bar span {
      flex: 1;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .logo-text {
        font-size: 3.2rem;
      }

      .tagline {
        font-size: 1.2rem;
      }

    }
  </style>
</head>

      </svg>
    </div>
  </div>
